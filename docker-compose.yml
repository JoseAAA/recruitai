services:
  # Vector Database for semantic search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: recruitai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - recruitai-network
    restart: unless-stopped

  # PostgreSQL for relational data
  postgres:
    image: postgres:15-alpine
    container_name: recruitai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recruitai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruitai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-recruitai_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - recruitai-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruitai}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama for local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: recruitai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_FLASH_ATTENTION=1        # 20-40% faster attention on GPU
      - OLLAMA_KEEP_ALIVE=60m           # Keep model in VRAM 60 min (avoid cold-start per upload session)
      - OLLAMA_NUM_PARALLEL=2           # Allow 2 concurrent requests (extraction + embedding overlap)
      - OLLAMA_MAX_LOADED_MODELS=2      # Keep both gemma3:4b and nomic-embed-text in VRAM
    networks:
      - recruitai-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # MinIO S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: recruitai-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-recruitai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-recruitai_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - recruitai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

    # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitai-backend
    ports:
      - "8000:8000"
    env_file:
      - .env                          # Fuente única de configuración
    environment:
      # Overrides de red interna Docker (usan nombres de servicios, no localhost)
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-recruitai}:${POSTGRES_PASSWORD:-recruitai_secret}@postgres:5432/${POSTGRES_DB:-recruitai_db}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=http://ollama:11434
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-recruitai}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-recruitai_secret}
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      - qdrant
      - postgres
      - ollama
      - minio
    restart: unless-stopped
    networks:
      - recruitai-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recruitai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - recruitai-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: recruitai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - recruitai-network

volumes:
  qdrant_data:
  postgres_data:
  ollama_data:
  minio_data:


networks:
  recruitai-network:
    driver: bridge
